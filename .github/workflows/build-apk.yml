name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install frontend dependencies
      run: npm install

    - name: Build frontend
      run: npx vite build

    - name: Package assets
      run: |
        rm -rf android/app/src/main/assets/www
        mkdir -p android/app/src/main/assets/www
        cp -r dist/* android/app/src/main/assets/www/

    - name: Accept licenses
      run: yes | sdkmanager --licenses || true

    - name: Install SDK components
      run: |
        sdkmanager "platforms;android-35" "build-tools;35.0.0"
        sdkmanager --list --no_https | grep -E "ndk|cmake" || true

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.6'

    - name: Grant execute permission
      run: chmod +x android/gradlew || true
    - name: Build Debug APK
      run: |
        cd android
        gradle assembleDebug --stacktrace --no-daemon

    - name: Find APK
      run: |
        echo "=== Build outputs ==="
        find android/app/build/outputs -name "*.apk" 2>/dev/null || echo "No APK found"
        echo "=== Build directory ==="
        ls -la android/app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug dir not found"
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: WebChat4-debug
        path: |
          android/app/build/outputs/apk/debug/*.apk
          android/app/build/outputs/apk/**/*.apk
        retention-days: 30
