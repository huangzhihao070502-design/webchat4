name: Build WebChat4 APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  ANDROID_COMPILE_SDK: '36'
  ANDROID_BUILD_TOOLS: '36.0.0'
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          NODE_ENV: production

      - name: Install server production dependencies
        working-directory: ./server
        run: |
          if [ -f package-lock.json ]; then
            npm ci --production
          else
            npm install --production --ignore-scripts
          fi

      - name: Download Termux Node.js + dependencies for Android ARM64
        run: |
          mkdir -p assets-tmp

          # 下载 Node.js
          curl -L -o /tmp/nodejs.deb \
            "https://packages.termux.dev/apt/termux-main/pool/main/n/nodejs/nodejs_26.3.0_aarch64.deb"
          dpkg-deb -x /tmp/nodejs.deb /tmp/node-extract
          cp /tmp/node-extract/data/data/com.termux/files/usr/bin/node assets-tmp/node-arm64

          # 下载依赖库: libc++, libicu, openssl, libnghttp2, libcares, brotli, zlib, libicu
          for pkg in libc++ libicu libnghttp2 libcares brotli openssl zlib icu-data; do
            PKG_URL="https://packages.termux.dev/apt/termux-main/pool/main"
            case "$pkg" in
              libc++)    curl -L -o /tmp/libcxx.deb "$PKG_URL/libc++/libc++_27c_aarch64.deb" 2>/dev/null && dpkg-deb -x /tmp/libcxx.deb /tmp/lib-extract ;;
              libicu)    curl -L -o /tmp/icu.deb "$PKG_URL/i/icu/icu-libs_78.1_aarch64.deb" 2>/dev/null && dpkg-deb -x /tmp/icu.deb /tmp/lib-extract ;;
              libnghttp2) curl -L -o /tmp/nghttp2.deb "$PKG_URL/n/nghttp2/libnghttp2_1.64.0_aarch64.deb" 2>/dev/null && dpkg-deb -x /tmp/nghttp2.deb /tmp/lib-extract ;;
              libcares)  curl -L -o /tmp/cares.deb "$PKG_URL/c/c-ares/libcares_1.34.6_aarch64.deb" 2>/dev/null && dpkg-deb -x /tmp/cares.deb /tmp/lib-extract ;;
              brotli)    curl -L -o /tmp/brotli.deb "$PKG_URL/b/brotli/libbrotli_1.2.0_aarch64.deb" 2>/dev/null && dpkg-deb -x /tmp/brotli.deb /tmp/lib-extract ;;
              openssl)   curl -L -o /tmp/ssl.deb "$PKG_URL/o/openssl/libssl3_3.5.7_aarch64.deb" 2>/dev/null && dpkg-deb -x /tmp/ssl.deb /tmp/lib-extract ;;
              zlib)      curl -L -o /tmp/zlib.deb "$PKG_URL/z/zlib/zlib_1.3.2_aarch64.deb" 2>/dev/null && dpkg-deb -x /tmp/zlib.deb /tmp/lib-extract ;;
            esac
          done

          # 收集所有 .so 文件到 lib 目录
          mkdir -p assets-tmp/lib
          find /tmp/lib-extract -name "*.so*" -exec cp {} assets-tmp/lib/ \; 2>/dev/null || true

          chmod +x assets-tmp/node-arm64
          echo "=== Node + libs ==="
          file assets-tmp/node-arm64
          ls -lh assets-tmp/node-arm64
          echo "Libraries:"
          ls -lh assets-tmp/lib/ 2>/dev/null || echo "  (no libs)"

      - name: Package APK assets
        run: |
          chmod +x scripts/package-assets.sh
          bash scripts/package-assets.sh

      - name: Set up Gradle wrapper
        working-directory: ./android
        run: |
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            "https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar"

      - name: Build APK
        working-directory: ./android
        run: |
          echo "sdk.dir=${ANDROID_HOME:-$ANDROID_SDK_ROOT}" > local.properties
          # Install required SDK components if needed
          yes | ${ANDROID_HOME:-$ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" "build-tools;35.0.0" 2>/dev/null || true
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.5
          fi
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Sign APK
        working-directory: ./android
        run: |
          APK=$(find app/build/outputs -name "*.apk" | head -1)
          echo "Found APK: $APK"
          KEYSTORE="$HOME/.android/debug.keystore"
          mkdir -p "$HOME/.android"
          if [ ! -f "$KEYSTORE" ]; then
            keytool -genkey -v -keystore "$KEYSTORE" \
              -storepass android -alias androiddebugkey \
              -keypass android -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -dname "CN=Debug, OU=Dev, O=WebChat4, C=US"
          fi
          cp "$APK" /tmp/app.apk
          BUILD_TOOLS_DIR="${ANDROID_HOME:-$ANDROID_SDK_ROOT}/build-tools/*"
          ZIPALIGN=$(ls $BUILD_TOOLS_DIR/zipalign 2>/dev/null | head -1)
          APKSIGNER=$(ls $BUILD_TOOLS_DIR/apksigner 2>/dev/null | head -1)
          [ -z "$ZIPALIGN" ] && ZIPALIGN="${ANDROID_HOME:-$ANDROID_SDK_ROOT}/build-tools/${ANDROID_BUILD_TOOLS}/zipalign"
          [ -z "$APKSIGNER" ] && APKSIGNER="${ANDROID_HOME:-$ANDROID_SDK_ROOT}/build-tools/${ANDROID_BUILD_TOOLS}/apksigner"
          $ZIPALIGN -f -p 4 /tmp/app.apk /tmp/app-aligned.apk
          $APKSIGNER sign --ks "$KEYSTORE" --ks-pass pass:android \
            --key-pass pass:android --ks-key-alias androiddebugkey \
            --out "$APK" /tmp/app-aligned.apk
          echo "Signed: $APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WebChat4-APK
          path: android/app/build/outputs/**/*.apk
          if-no-files-found: error
          retention-days: 30
